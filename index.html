<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Aziz Hospital</title>
    <style>
        /* Login Screen Design */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        .login-box h2 { margin-bottom: 20px; color: #333; }
        .login-box input { display: block; width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .login-box button { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .login-box button:hover { background: #218838; }
        #error-msg { color: #dc3545; font-size: 14px; margin-top: 10px; display: none; }

        /* Main Software Content (Hidden by default) */
        #main-app { display: none; font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; width: 100%; }
        .container { width: 60%; padding: 20px; background: white; border-right: 2px solid #ddd; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .right-panel { width: 40%; padding: 20px; background: #e9ecef; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .form-group { margin-bottom: 10px; display: flex; align-items: center; }
        label { width: 140px; font-weight: bold; font-size: 14px; }
        input, select { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .buttons { margin-top: 20px; display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn { padding: 10px 15px; cursor: pointer; border: none; color: white; border-radius: 4px; font-weight: bold; }
        .btn-save { background: #28a745; }
        .btn-add { background: #007bff; }
        .btn-search { background: #17a2b8; }
        .btn-delete { background: #dc3545; }
        .developer-info { margin-top: 30px; padding: 15px; border-top: 2px solid #333; background: #fff; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #333; color: white; }
    </style>
</head>
<body>

<!-- Login Section -->
<div id="login-screen">
    <div class="login-box">
        <h2>Hospital Login</h2>
        <input type="text" id="userInput" placeholder="Username Likhein">
        <input type="password" id="passInput" placeholder="Password Likhein">
        <button onclick="validateLogin()">LOGIN</button>
        <p id="error-msg">Ghalat User ya Password!</p>
    </div>
</div>

<!-- Main Application Section -->
<div id="main-app">
    <div class="container">
        <h2>OPD Registration</h2>
        <div class="form-group"><label>Date:</label><input type="date" id="entryDate" onchange="resetAppNo()"></div>
        <div class="form-group">
            <label>MR Number:</label>
            <input type="text" id="mrNumber" readonly style="background:#eee;">
            <button class="btn btn-search" style="margin-left:5px" onclick="searchMR()">MR Search</button>
        </div>
        <div class="form-group"><label>App#:</label><input type="text" id="appNo" readonly style="background:#eee;"></div>
        <div class="form-group">
            <label>Fee Type:</label>
            <select id="feeType"><option>OPD</option><option>USG</option><option>ECG</option></select>
        </div>
        <div class="form-group">
            <label>Dr. Name:</label>
            <select id="drName"><option>Dr. Aziz</option><option>Dr. Ahmed</option><option>Dr. Fatima</option></select>
        </div>
        <div class="form-group"><label>Patient Name:</label><input type="text" id="pName"></div>
        <div class="form-group"><label>CNIC:</label><input type="text" id="cnic"></div>
        <div class="form-group"><label>Age:</label><input type="number" id="age"></div>
        <div class="form-group">
            <label>Gender:</label>
            <select id="gender"><option>Male</option><option>Female</option><option>Other</option></select>
        </div>
        <div class="form-group"><label>Contact:</label><input type="text" id="contact"></div>
        <div class="form-group"><label>Address:</label><input type="text" id="address"></div>
        <div class="form-group"><label>City:</label><input type="text" id="city"></div>

        <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-top:15px; border:1px solid #eee;">
            <h3>Pre-Examination</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group"><label>BP:</label><input type="text" id="bp"></div>
                <div class="form-group"><label>Temp:</label><input type="text" id="temp"></div>
                <div class="form-group"><label>Pulse:</label><input type="text" id="pulse"></div>
                <div class="form-group"><label>SPO2:</label><input type="text" id="spo2"></div>
                <div class="form-group"><label>Fee:</label><input type="number" id="fee"></div>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-save" onclick="saveAndPrint()">Save and Print</button>
            <button class="btn btn-add" onclick="addNew()">Add New</button>
            <button class="btn btn-delete" onclick="deleteRecord()">Delete</button>
        </div>

        <div class="developer-info">Developer Ayaz majeed 0300-1199701</div>
    </div>

    <div class="right-panel">
        <h3>Patient Records</h3>
        <table id="recordTable">
            <thead><tr><th>App#</th><th>MR#</th><th>Name</th><th>Date</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // Login Logic
    function validateLogin() {
        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;
        
        if (user === "Ayaz Majeed" && pass === "Ayaz786") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    // Main Software Logic
    let patients = JSON.parse(localStorage.getItem('patients')) || [];
    let mrCounter = parseInt(localStorage.getItem('mrCounter')) || 1;

    window.onload = function() {
        document.getElementById('entryDate').valueAsDate = new Date();
        addNew();
        loadTable();
    };

    function addNew() {
        ['pName', 'cnic', 'age', 'contact', 'address', 'city', 'bp', 'temp', 'pulse', 'spo2', 'fee'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('mrNumber').value = mrCounter;
        resetAppNo();
    }

    function resetAppNo() {
        let date = document.getElementById('entryDate').value;
        let todaysCount = patients.filter(p => p.date === date).length;
        document.getElementById('appNo').value = todaysCount + 1;
    }

    function saveAndPrint() {
        let name = document.getElementById('pName').value;
        if(!name) { alert("Pehle Patient ka naam likhein!"); return; }

        let patient = {
            date: document.getElementById('entryDate').value,
            mr: document.getElementById('mrNumber').value,
            appNo: document.getElementById('appNo').value,
            name: name,
            contact: document.getElementById('contact').value,
            dr: document.getElementById('drName').value,
            fee: document.getElementById('fee').value
        };

        patients.push(patient);
        if (parseInt(patient.mr) === mrCounter) mrCounter++;
        
        localStorage.setItem('patients', JSON.stringify(patients));
        localStorage.setItem('mrCounter', mrCounter);
        
        loadTable();
        printSlip(patient);
        addNew();
    }

    function printSlip(p) {
        let win = window.open('', '', 'width=400,height=600');
        win.document.write(`<html><body style="font-family:monospace;padding:20px;">
            <center><h2>AZIZ HOSPITAL</h2><p>OPD RECEIPT</p></center><hr>
            <p>MR#: ${p.mr} | App#: ${p.appNo}</p>
            <p>Date: ${p.date}</p>
            <p>Patient: ${p.name}</p>
            <p>Doctor: ${p.dr}</p>
            <p>Fee: ${p.fee} PKR</p><hr>
            <center><p>Get Well Soon</p><small>Ayaz Majeed 0300-1199701</small></center>
        </body></html>`);
        win.document.close();
        win.print();
    }

    function searchMR() {
        let id = prompt("MR Number likhein:");
        let f = patients.find(p => p.mr == id);
        if(f) {
            document.getElementById('pName').value = f.name;
            document.getElementById('contact').value = f.contact;
            alert("Purana Record Mil Gaya!");
        } else alert("Record Nahi Mila!");
    }

    function loadTable() {
        let tbody = document.querySelector('#recordTable tbody');
        tbody.innerHTML = '';
        patients.slice().reverse().forEach(p => {
            tbody.innerHTML += `<tr><td>${p.appNo}</td><td>${p.mr}</td><td>${p.name}</td><td>${p.date}</td></tr>`;
        });
    }

    function deleteRecord() {
        let id = prompt("Delete karne ke liye MR# likhein:");
        if(confirm("Kia waqai delete karna hai?")) {
            patients = patients.filter(p => p.mr != id);
            localStorage.setItem('patients', JSON.stringify(patients));
            loadTable();
        }
    }
</script>

</body>
</html>
